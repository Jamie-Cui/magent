name: CI

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        emacs_version: ['29.4', '30.1']
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Emacs (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo add-apt-repository -y ppa:kelleyk/emacs
        sudo apt-get update
        sudo apt-get install -y emacs${{ matrix.emacs_version }}-nox

    - name: Install Emacs (macOS)
      if: runner.os == 'macOS'
      run: |
        brew tap d12frosted/emacs-plus
        brew install emacs-plus@${{ matrix.emacs_version }} --without-cocoa
        brew link emacs-plus@${{ matrix.emacs_version }}

    - name: Verify Emacs version
      run: emacs --version

    - name: Install dependencies
      run: |
        mkdir -p ~/.emacs.d/elpa
        emacs --batch \
          --eval "(require 'package)" \
          --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\"))" \
          --eval "(package-initialize)" \
          --eval "(package-refresh-contents)" \
          --eval "(package-install 'gptel)" \
          --eval "(package-install 'markdown-mode)" \
          --eval "(package-install 'spinner)"

    - name: Byte compile
      run: make compile

    - name: Run tests
      run: make test

  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Emacs
      run: |
        sudo add-apt-repository -y ppa:kelleyk/emacs
        sudo apt-get update
        sudo apt-get install -y emacs30-nox

    - name: Check for package-lint issues
      run: |
        emacs --batch \
          --eval "(require 'package)" \
          --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\"))" \
          --eval "(package-initialize)" \
          --eval "(package-refresh-contents)" \
          --eval "(package-install 'package-lint)" \
          -f package-lint-batch-and-exit *.el

    - name: Check for trailing whitespace
      run: |
        ! grep -r '[[:blank:]]$' --include='*.el' .
