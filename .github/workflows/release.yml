name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Emacs
      run: |
        sudo add-apt-repository -y ppa:kelleyk/emacs
        sudo apt-get update
        sudo apt-get install -y emacs30-nox

    - name: Install dependencies
      run: |
        mkdir -p ~/.emacs.d/elpa
        emacs --batch \
          --eval "(require 'package)" \
          --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\"))" \
          --eval "(package-initialize)" \
          --eval "(package-refresh-contents)" \
          --eval "(package-install 'gptel)" \
          --eval "(package-install 'markdown-mode)" \
          --eval "(package-install 'spinner)"

    - name: Run tests
      run: make test

    - name: Create package
      run: |
        # Create package tarball
        tar czf magent-${{ github.ref_name }}.tar.gz \
          --exclude='.git*' \
          --exclude='test' \
          --exclude='*.elc' \
          *.el

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: magent-${{ github.ref_name }}.tar.gz
        body: |
          Magent release ${{ github.ref_name }}

          ## Installation

          ```elisp
          ;; Manual installation
          (add-to-list 'load-path "/path/to/magent")
          (require 'magent)
          (global-magent-mode 1)
          ```

          See README.md for full documentation.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
